site_name: Monash Robotics
site_url: https://monashrobotics.github.io/wiki/
site_description: Lab wiki for students and researchers at Monash Robotics
repo_url: https://github.com/MonashRobotics/wiki
repo_name: MonashRobotics/wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MonashRobotics
      name: MonashRobotics on GitHub
    - icon: fontawesome/solid/globe
      link: https://www.monash.edu/engineering/robotics
      name: Monash Robotics

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Onboarding:
    - Getting Started: onboarding/index.md
    - New PhD Student Checklist: onboarding/phd.md
    - HPC Access: onboarding/hpc-access.md
  - HPC:
    - Overview: hpc/index.md
    - M3 (Monash): hpc/m3.md
    - M3 Admin Guide: hpc/m3-admin.md
    - Pawsey Setonix: hpc/pawsey.md
    - NCI Gadi: hpc/nci.md
  - Storage:
    - S Drive: storage/s-drive.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: en

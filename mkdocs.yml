site_name: Monash Robotics Wiki
site_url: https://monashrobotics.github.io/wiki/
repo_url: https://github.com/MonashRobotics/wiki
repo_name: MonashRobotics/wiki

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Onboarding:
    - Getting Started: onboarding/index.md
    - New PhD Student Checklist: onboarding/phd.md
    - HPC Access: onboarding/hpc-access.md
  - HPC:
    - Overview: hpc/index.md
    - M3 (Monash): hpc/m3.md
    - S Drive: hpc/s-drive.md
    - Pawsey Setonix: hpc/pawsey.md
    - NCI Gadi: hpc/nci.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
